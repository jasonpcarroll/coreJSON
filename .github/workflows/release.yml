name: Release automation

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version_number:
        description: 'Release Version Number (Eg, v1.0.0)'
        required: true
      branch:
        description: 'Branch to release from'
        required: false
        default: 'main'
      delete_existing_tag_release:
        description: 'Is this a re-release of existing tag/release? (Default: false)'
        default: 'false'
        required: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Release
        uses: jasonpcarroll/CI-CD-Github-Actions/release@main
        with:
          version_number: ${{ github.event.inputs.version_number }}
          branch: ${{ github.event.inputs.branch }}
          delete_existing_tag_release: ${{ github.event.inputs.delete_existing_tag_release }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
